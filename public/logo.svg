<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 560" fill="none">
  <defs>
    <linearGradient id="gold" x1="160" y1="60" x2="470" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8CE8A"/>
      <stop offset="0.5" stop-color="#C8A04A"/>
      <stop offset="1" stop-color="#B8893A"/>
    </linearGradient>
  </defs>

  <!-- Emblem: stylized Coastal Edge monogram -->
  <g stroke="url(#gold)" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- outer ring -->
    <circle cx="310" cy="195" r="150"/>
    <!-- doubled lower arc -->
    <path d="M 192 270 A 132 132 0 0 0 428 270"/>
    <!-- horizontal bar extending past the right edge -->
    <path d="M 175 195 L 500 195"/>
    <!-- vertical stem -->
    <path d="M 310 70 L 310 195"/>
  </g>

  <!-- Wordmark -->
  <text x="310" y="445" text-anchor="middle" fill="#1B2A4A"
        font-family="Georgia, 'Times New Roman', serif" font-size="98" font-weight="500" letter-spacing="6">COASTAL EDGE</text>
  <text x="310" y="510" text-anchor="middle" fill="#1B2A4A"
        font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="400" letter-spacing="14">CABINETRY AND DESIGN</text>
</svg>
